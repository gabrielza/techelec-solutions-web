# Suggested Netlify site name when this repo is first imported.
# Netlify will append a random suffix if 'techelec-solutions' is already taken globally.
# IMPORTANT: when deploying, ALWAYS create a NEW Netlify site for this repo —
# do NOT link it to any existing site. See README.md → "Deploying to Netlify".
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
